
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pale App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #010103;
            --glass-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.03) 100%);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-yellow: #DFFF00;
            --accent-blue: #00D1FF;
            --accent-red: #FF3D00;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.45);
            --safe-area-top: env(safe-area-inset-top);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .bg-glow { position: fixed; width: 400px; height: 400px; border-radius: 50%; z-index: -1; filter: blur(100px); opacity: 0.3; pointer-events: none; }
        .bg-red { top: -80px; right: -40px; background: var(--accent-red); }
        .bg-blue { bottom: -40px; left: -80px; background: var(--accent-blue); width: 500px; height: 500px; opacity: 0.2; }

        .view { display: none; padding: 15px; padding-top: 90px; min-height: 100vh; position: relative; z-index: 10; }
        .view.active { display: block; }

        /* Elegant Sticky Header */
        .glass-header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border-bottom: 0.5px solid var(--glass-border);
            padding: calc(12px + var(--safe-area-top)) 20px 12px 20px;
            z-index: 2000;
            display: flex; justify-content: space-between; align-items: center;
        }

        .brand-logo { font-size: 1.1rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .brand-logo span { font-weight: 200; opacity: 0.6; }
        .brand-logo::before { content: ''; width: 6px; height: 6px; background: var(--accent-yellow); border-radius: 50%; box-shadow: 0 0 8px var(--accent-yellow); }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px 0 rgba(0, 0, 0, 0.3), inset 0 0 10px rgba(255,255,255,0.03);
        }

        h2 { font-size: 1.5rem; font-weight: 900; margin: 0; letter-spacing: -0.5px; line-height: 1.1; }
        h3 { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin: 25px 0 12px 0; display: flex; align-items: center; justify-content: space-between; }

        .tag {
            display: inline-block; font-size: 0.6rem; font-weight: 900; text-transform: uppercase; 
            letter-spacing: 1.2px; color: var(--accent-yellow); margin-bottom: 6px;
        }

        .resume-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 28px;
            padding: 20px; margin-bottom: 25px; cursor: pointer; transition: 0.2s;
        }
        .resume-card:active { transform: scale(0.97); }

        .list-card { 
            background: rgba(255,255,255,0.06); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 20px; padding: 16px; 
            margin-bottom: 10px; display: flex; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .list-card:active { background: rgba(255,255,255,0.12); }
        .list-card.completed { border-left: 3px solid var(--accent-yellow); }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 6px 12px;
            font-weight: 600; font-size: 0.65rem; text-transform: uppercase; cursor: pointer;
        }
        .nav-btn.primary { background: var(--accent-yellow); color: #000; border: none; }

        .week-grid { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .week-btn { 
            flex: 0 0 55px; padding: 12px; background: rgba(255,255,255,0.04); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; 
            color: #fff; font-weight: 800; text-align: center; cursor: pointer; font-size: 0.75rem;
        }
        .week-btn.active { background: #fff; color: #000; }

        .ex-item { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 20px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; cursor: pointer;
        }
        .ex-item.done { opacity: 0.3; transform: scale(0.98); }

        .metric-box { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 10px; text-align: center; flex: 1; border: 1px solid rgba(255,255,255,0.05); }
        .metric-label { font-size: 0.55rem; font-weight: 600; color: var(--text-dim); text-transform: uppercase; }
        .metric-value { font-size: 1rem; font-weight: 900; margin-top: 3px; color: var(--accent-yellow); }

        .set-block { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .set-circle { 
            width: 42px; height: 42px; border: 1px solid rgba(255,255,255,0.25); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.9rem; cursor: pointer;
        }
        .set-circle.active { background: var(--accent-yellow); border-color: var(--accent-yellow); color: #000; box-shadow: 0 0 15px rgba(223, 255, 0, 0.3); }

        .load-input { border: none; border-bottom: 1.5px solid var(--accent-yellow); font-weight: 900; font-size: 1.2rem; width: 65px; text-align: center; background: transparent; color: #fff; }
        
        .progress-monitor { height: 3px; background: rgba(255,255,255,0.08); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-yellow); transition: 0.5s; }

        .action-btn { padding: 6px 12px; border-radius: 15px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-weight: 800; font-size: 0.55rem; text-transform: uppercase; cursor: pointer; }
        .action-btn.danger { color: var(--accent-red); }

        .btn-floating { background: var(--accent-yellow); color: #000; border: none; border-radius: 25px; padding: 14px 24px; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; cursor: pointer; box-shadow: 0 8px 25px rgba(223, 255, 0, 0.3); transition: 0.2s; }
        .btn-floating:active { transform: scale(0.95); opacity: 0.9; }
        .btn-floating.dim { background: rgba(255,255,255,0.1); color: #fff; box-shadow: none; }

        #toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; padding: 8px 16px; font-weight: 900; border-radius: 40px; z-index: 9999; display: none; font-size: 0.6rem; text-transform: uppercase; }
        
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-glow bg-red"></div>
    <div class="bg-glow bg-blue"></div>
    <div id="toast"></div>

    <div class="glass-header">
        <div class="brand-logo" onclick="showView('view-home')" style="cursor:pointer">PALE <span>APP</span></div>
        <div id="header-actions">
            <button class="nav-btn primary" onclick="showView('view-import')">Nuovo</button>
        </div>
    </div>

    <div id="view-home" class="view active">
        <div class="progress-monitor"><div id="progress-bar" class="progress-fill" style="width:0%"></div></div>
        <div id="resume-section"></div>
        <h3>I tuoi Piani <button id="manage-btn" class="action-btn" style="float:right" onclick="toggleManageMode()">Edit</button></h3>
        <div id="workouts-list"></div>
    </div>

    <div id="view-import" class="view">
        <div class="glass-panel">
            <div class="tag">Sync Engine</div>
            <h2 style="margin-bottom:15px;">IMPORTA <span>PIANO</span></h2>
            <textarea id="import-text" style="width:100%; height:250px; border:1px solid rgba(255,255,255,0.1); background:rgba(0,0,0,0.4); color:#fff; border-radius:20px; padding:15px; font-family:monospace; font-size:0.8rem;"></textarea>
            <button id="import-btn" class="btn-floating" style="width:100%; margin-top:15px;" onclick="importAction()">Inizializza Protocollo</button>
            <button class="action-btn" style="width:100%; margin-top:10px; background:transparent;" onclick="showView('view-home')">Torna alla Dashboard</button>
        </div>
    </div>

    <div id="view-workout" class="view">
        <div id="workout-content"></div>
        <div style="margin-top:20px;"><button class="btn-floating dim" style="width:100%;" onclick="showView('view-home')">Chiudi</button></div>
    </div>

    <div id="view-session" class="view">
        <div id="session-header"></div>
        <div id="session-content"></div>
        <div style="margin-top:25px; display:flex; gap:10px;">
            <button class="btn-floating dim" style="flex:1;" onclick="openWorkout(currentWorkoutIndex)">Esci</button>
            <button class="btn-floating" style="flex:2;" onclick="finishSession()">Salva Sessione</button>
        </div>
    </div>

    <div id="view-exercise" class="view">
        <div id="ex-header"></div>
        <div id="ex-content"></div>
        <div style="margin-top:25px; display:flex; gap:8px;">
            <button class="btn-floating dim" style="padding:14px 15px;" onclick="startSession(currentDayIdx)">Elenco</button>
            <button class="btn-floating dim" style="padding:14px 15px; background:rgba(255,255,255,0.05);" onclick="nextExercise()">Salta</button>
            <button class="btn-floating" style="flex:1;" onclick="nextExercise()">Avanti</button>
        </div>
    </div>

    <script>
        let workouts = JSON.parse(localStorage.getItem('pale_workouts') || '[]');
        let manageMode = false;
        let currentWorkoutIndex = null;
        let currentWeek = 1;
        let currentDayIdx = null;
        let currentExIdx = null;

        async function init() {
            try {
                const res = await fetch('/api/workouts');
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.length > 0) {
                        workouts = data;
                        localStorage.setItem('pale_workouts', JSON.stringify(workouts));
                        renderHome();
                    }
                }
            } catch(e) { console.error("Load error:", e); }
        }
        init();

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function getInc(w) {
            if(!w.days) return null;
            for(let w_i=1; w_i<=w.numWeeks; w_i++) {
                for(let d_i=0; d_i<w.days.length; d_i++) {
                    if(!w.progress || !w.progress[w_i] || !w.progress[w_i][d_i]) return { week: w_i, day: d_i };
                }
            }
            return null;
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function toggleManageMode() {
            manageMode = !manageMode;
            document.getElementById('manage-btn').innerText = manageMode ? 'Fine' : 'Edit';
            renderHome();
        }

        function renderHome() {
            const res = document.getElementById('resume-section');
            const progBar = document.getElementById('progress-bar');
            res.innerHTML = '';
            if (workouts.length > 0) {
                const w = workouts[0];
                const n = getInc(w);
                let t = w.numWeeks * (w.days?w.days.length:0);
                let d = 0;
                if (w.progress) Object.values(w.progress).forEach(wk => d += Object.keys(wk).length);
                progBar.style.width = (t ? Math.round((d/t)*100) : 0) + '%';
                if (n) {
                    res.innerHTML = `
                        <div class="resume-card" onclick="resumeWorkout(0)">
                            <div class="tag">Continua Allenamento</div>
                            <h2 style="color:var(--accent-yellow); font-size:1.3rem;">${sanitize(w.title)}</h2>
                            <p style="font-weight:600; opacity:0.4; margin-top:5px; font-size:0.8rem;">Settimana ${n.week} • Giorno ${n.day+1}</p>
                        </div>`;
                }
            }
            const list = document.getElementById('workouts-list');
            list.innerHTML = workouts.length === 0 ? '<div class="glass-panel" style="font-size:0.8rem; text-align:center;">Nessun piano caricato.</div>' : '';
            workouts.forEach((w, i) => {
                const card = document.createElement('div');
                card.className = `list-card`;
                card.onclick = () => { if(!manageMode) openWorkout(i); };
                card.innerHTML = `
                    <div style="flex:1">
                        <b style="font-size:1rem">${w.title}</b><br>
                        <small style="opacity:0.3; text-transform:uppercase; font-weight:900; font-size:0.55rem;">${w.subtitle || "Standard"}</small>
                    </div>
                    ${manageMode ? `<div class="action-btn danger" onclick="event.stopPropagation(); deleteWorkout(${i})">Elimina</div>` : ''}
                `;
                list.appendChild(card);
            });
        }

        function resumeWorkout(idx) { const w = workouts[idx]; const n = getInc(w); currentWorkoutIndex = idx; if(n) { currentWeek = n.week; startSession(n.day); } else openWorkout(idx); }
        function sanitize(str) { return str ? str.replace(/^[#\*\s\-\–\—]+/g, '').replace(/[#\*\-\–\—\s]+$/g, '').trim() : ""; }
        
        function openWorkout(idx) { 
            currentWorkoutIndex = idx; 
            const w = workouts[idx]; 
            const n = getInc(w); 
            if(!currentWeek) currentWeek = n ? n.week : 1;
            
            const weekInfo = w.weeklyStructure?.find(s => s.week === 'W' + currentWeek);
            const content = document.getElementById('workout-content');
            content.innerHTML = `
                <div class="glass-panel" style="padding:15px 20px;">
                    <div class="tag">Piano Attivo</div>
                    <h2 style="font-size:1.3rem; margin-bottom:8px;">${sanitize(w.title)}</h2>
                    ${weekInfo ? `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:12px; border:1px solid rgba(255,255,255,0.05); margin-top:8px;">
                        <small style="font-weight:900; color:var(--accent-yellow); font-size:0.55rem; text-transform:uppercase;">Focus Settimana ${currentWeek}</small>
                        <p style="margin:4px 0 0 0; font-size:0.75rem; font-weight:600; opacity:0.8;">${weekInfo.note || weekInfo.focus}</p>
                    </div>` : ''}
                </div>
                <div class="week-grid" id="week-selector"></div>
                <div id="day-list"></div>
            `;
            const sel = document.getElementById('week-selector');
            for(let i=1; i<=w.numWeeks; i++) {
                const b = document.createElement('div');
                b.className = `week-btn ${currentWeek === i ? 'active' : ''}`;
                b.innerHTML = `W${i}`;
                b.onclick = () => { currentWeek = i; openWorkout(idx); };
                sel.appendChild(b);
            }
            const dList = document.getElementById('day-list');
            w.days.forEach((d, dI) => {
                const status = w.progress && w.progress[currentWeek] && w.progress[currentWeek][dI];
                const c = document.createElement('div');
                c.className = `list-card ${status ? 'completed' : ''}`;
                c.onclick = () => startSession(dI);
                c.innerHTML = `<div style="flex:1"><small style="opacity:0.3; font-weight:900; font-size:0.55rem;">GIORNO ${dI+1}</small><br><b style="font-size:0.95rem;">${sanitize(d.name)}</b></div>`;
                dList.appendChild(c);
            });
            showView('view-workout');
        }

        function startSession(dI) {
            currentDayIdx = dI;
            const w = workouts[currentWorkoutIndex];
            const d = w.days[dI];
            document.getElementById('session-header').innerHTML = `
                <div class="glass-panel" style="padding:15px 20px;">
                    <div class="tag" style="color:var(--accent-blue)">Sessione</div>
                    <h2 style="font-size:1.3rem;">${sanitize(d.name)}</h2>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px;">
                        <small style="opacity:0.4; font-weight:900; font-size:0.6rem;">W${currentWeek}</small>
                        <button class="action-btn danger" onclick="resetDayAction()">Reset</button>
                    </div>
                </div>`;
            const content = document.getElementById('session-content');
            content.innerHTML = '';
            d.exercises.forEach((ex, eI) => {
                const isD = ex.sessionData && ex.sessionData[currentWeek] && ex.sessionData[currentWeek].completed;
                const item = document.createElement('div');
                item.className = `ex-item ${isD ? 'done' : ''}`;
                item.onclick = () => openExercise(eI);
                item.innerHTML = `<div style="flex:1; font-size:0.95rem;"><b>${sanitize(ex.name)}</b></div><div style="font-weight:900; font-size:0.65rem; color:var(--accent-yellow)">${ex.sets}S</div>`;
                content.appendChild(item);
            });
            showView('view-session');
        }

        function openExercise(eI) {
            currentExIdx = eI;
            const w = workouts[currentWorkoutIndex];
            const ex = w.days[currentDayIdx].exercises[eI];
            if (!ex.sessionData) ex.sessionData = {};
            if (!ex.sessionData[currentWeek]) ex.sessionData[currentWeek] = { completed: false, rounds: [], notes: "" };
            const data = ex.sessionData[currentWeek];
            let subExs = [];
            if (ex.notes && (ex.notes.includes('+') || ex.name.toLowerCase().includes('circuito'))) {
                subExs = ex.notes.split('+').map(s => {
                    const m = s.trim().match(/(.*?)\s*(\d+.*)/);
                    return { name: m ? m[1].trim() : s.trim(), reps: m ? m[2].trim() : "" };
                }).filter(x => x.name);
            }
            if (subExs.length === 0) subExs = [{ name: sanitize(ex.name), reps: ex.reps }];
            const nR = parseInt(ex.sets) || 1;
            while (data.rounds.length < nR) data.rounds.push({ done: false, subLoads: new Array(subExs.length).fill("") });
            
            document.getElementById('ex-header').innerHTML = `
                <div class="glass-panel" style="padding:15px 20px;">
                    <div class="tag">Dettaglio</div>
                    <h2 style="font-size:1.3rem;">${sanitize(ex.name)}</h2>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <div class="metric-box"><div class="metric-label">SETS</div><div class="metric-value">${ex.sets}</div></div>
                        <div class="metric-box"><div class="metric-label">REPS</div><div class="metric-value">${subExs.length > 1 ? 'CIRC' : ex.reps}</div></div>
                        <div class="metric-box"><div class="metric-label">REST</div><div class="metric-value">${ex.rest}</div></div>
                    </div>
                </div>`;
            const content = document.getElementById('ex-content');
            content.innerHTML = '';
            data.rounds.forEach((round, rI) => {
                const block = document.createElement('div');
                block.className = 'set-block';
                let subHtml = '';
                subExs.forEach((sx, sI) => {
                    subHtml += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <div><b style="font-size:0.85rem">${sx.name}</b><br><small style="opacity:0.4; font-size:0.7rem;">${sx.reps}</small></div>
                        <div style="display:flex; align-items:center;">
                            <input type="number" class="load-input" value="${round.subLoads[sI] || ""}" oninput="updateSubLoad(${rI}, ${sI}, this.value)">
                            <small style="font-weight:900; margin-left:6px; color:var(--accent-yellow); font-size:0.7rem;">KG</small>
                        </div>
                    </div>`;
                });
                block.innerHTML = `
                    <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
                        <div class="set-circle ${round.done ? 'active' : ''}" onclick="toggleRound(${rI})">${rI+1}</div>
                        <div style="font-weight:900; font-size:0.6rem; opacity:0.35;">${subExs.length > 1 ? 'ROUND' : 'SERIE'}</div>
                    </div>
                    ${subHtml}`;
                content.appendChild(block);
            });
            const notes = document.createElement('div');
            notes.className = 'glass-panel';
            notes.innerHTML = `<small style="font-weight:900; opacity:0.35; font-size:0.6rem;">NOTE SESSIONE</small><textarea id="session-notes" oninput="updateSessionNotes()" style="width:100%; border:none; margin-top:8px; background:transparent; color:#fff; font-family:inherit; min-height:60px; font-size:0.85rem;">${data.notes || ""}</textarea>`;
            content.appendChild(notes);
            showView('view-exercise');
        }

        function toggleRound(rI) { const data = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[currentExIdx].sessionData[currentWeek]; data.rounds[rI].done = !data.rounds[rI].done; save(); openExercise(currentExIdx); }
        function updateSubLoad(rI, sI, val) { const data = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[currentExIdx].sessionData[currentWeek]; data.rounds[rI].subLoads[sI] = val; save(); }
        function updateSessionNotes() { const val = document.getElementById('session-notes').value; const data = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[currentExIdx].sessionData[currentWeek]; data.notes = val; save(); }
        function nextExercise() { const d = workouts[currentWorkoutIndex].days[currentDayIdx]; if(currentExIdx < d.exercises.length - 1) openExercise(currentExIdx + 1); else startSession(currentDayIdx); }
        function resetDayAction() { if(confirm('RESET?')) { const d = workouts[currentWorkoutIndex].days[currentDayIdx]; d.exercises.forEach(ex => { if(ex.sessionData) delete ex.sessionData[currentWeek]; }); if(workouts[currentWorkoutIndex].progress && workouts[currentWorkoutIndex].progress[currentWeek]) delete workouts[currentWorkoutIndex].progress[currentWeek][currentDayIdx]; save(); startSession(currentDayIdx); } }
        function finishSession() { const w = workouts[currentWorkoutIndex]; if (!w.progress) w.progress = {}; if (!w.progress[currentWeek]) w.progress[currentWeek] = {}; w.progress[currentWeek][currentDayIdx] = true; save(); showToast("SESSIONE SALVATA"); openWorkout(currentWorkoutIndex); }
        function save() {
            localStorage.setItem('pale_workouts', JSON.stringify(workouts));
            if (currentWorkoutIndex !== null) {
                fetch('/api/workouts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(workouts[currentWorkoutIndex]) }).catch(e => console.error(e));
            }
        }
        function deleteWorkout(i) { if(confirm('ELIMINA?')) { const id = workouts[i].id; workouts.splice(i, 1); localStorage.setItem('pale_workouts', JSON.stringify(workouts)); renderHome(); fetch(`/api/workouts/${id}`, { method: 'DELETE' }).catch(e => console.error(e)); } }
        function importAction() {
            const raw = document.getElementById('import-text').value;
            if(!raw.trim()) return;
            const btn = document.getElementById('import-btn');
            btn.innerText = "SINCRONIZZAZIONE..."; btn.disabled = true;
            setTimeout(() => {
                const w = { id: "p-" + Date.now(), title: "NUOVO PROTOCOLLO", subtitle: "", days: [], numWeeks: 4, progress: {} };
                const lines = raw.split('\n');
                let curD = null;
                lines.forEach(l => {
                    if(l.startsWith('## ') && (l.toLowerCase().includes('giorno') || l.toLowerCase().includes('sessione'))) {
                        if(curD) w.days.push(curD);
                        curD = { name: l.replace('##', '').trim(), exercises: [] };
                    } else if(curD && l.includes('|') && !l.includes('Esercizio') && !l.includes('---')) {
                        const cols = l.split('|').map(c => c.trim());
                        if(cols.length >= 4) curD.exercises.push({ name: cols[1], sets: cols[2], reps: cols[3], rest: cols[4] || "90s", notes: cols[5] || "" });
                    }
                });
                if(curD) w.days.push(curD);
                if(w.days.length > 0) { workouts.unshift(w); save(); showView('view-home'); renderHome(); }
                btn.innerText = "Sincronizza"; btn.disabled = false;
            }, 800);
        }
        renderHome();
    </script>
</body>
</html>
