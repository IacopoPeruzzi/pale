
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pale App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-color: #e8e6e1; /* Cream/Off-white */
            --card-bg: transparent;
            --accent-color: #111111; /* Deep black for lines and text */
            --outline-color: #ff3300; /* Vibrant editorial red */
            --text-primary: #111111;
            --text-secondary: #555555;
            --border-radius: 0px;
            --safe-area-top: env(safe-area-inset-top);
            --line-thickness: 1px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
            background-image: 
                linear-gradient(var(--accent-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-color) 1px, transparent 1px);
            background-size: 100% 100px, 100px 100%;
            background-position: center top;
            background-repeat: repeat;
            /* Very subtle grid background to mimic the poster lines, but we'll make it extremely faint */
            background-image: none; /* Let's stick to clean borders instead of full grid background to avoid mess */
        }

        .view { display: none; padding: 0 20px 180px 20px; min-height: 100vh; position: relative; z-index: 10; }
        .view.active { display: block; animation: fade 0.4s ease-out; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .sticky-header {
            position: sticky; top: 0; 
            padding: calc(30px + var(--safe-area-top)) 20px 20px 20px;
            margin: 0 -20px 20px -20px;
            background: var(--bg-color);
            border-bottom: var(--line-thickness) solid var(--accent-color);
            z-index: 1000;
        }
        
        .home-header-inner { display: flex; justify-content: space-between; align-items: flex-end; }

        .brand-title { font-size: 3.5rem; font-weight: 900; margin: 0; letter-spacing: -2px; text-transform: uppercase; line-height: 0.8; }
        .brand-title span.outline { color: transparent; -webkit-text-stroke: 1.5px var(--outline-color); display: block; }
        .brand-title span.solid { color: var(--outline-color); }
        
        .util-text { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 1px; line-height: 1.4; text-align: right; font-weight: 600; }

        h2 { font-size: 2.2rem; font-weight: 300; margin: 0; letter-spacing: -1px; line-height: 1.1; text-transform: uppercase; color: transparent; -webkit-text-stroke: 1px var(--accent-color); }
        h3 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--outline-color); margin: 30px 0 15px 0; display: flex; align-items: center; justify-content: space-between; border-top: var(--line-thickness) solid var(--accent-color); padding-top: 10px; }

        .subtitle { color: var(--text-primary); font-size: 0.8rem; margin-top: 10px; font-weight: 300; text-transform: uppercase; letter-spacing: 1px; }

        /* PROGRESS MONITOR */
        .progress-monitor { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-color); margin: 15px 0 8px 0; display: flex; justify-content: space-between; }

        .resume-card {
            background: transparent;
            border-top-left-radius: 150px; border-top-right-radius: 150px; /* Arch shape */
            padding: 80px 20px 30px 20px; margin: 20px 0 30px 0;
            border: var(--line-thickness) solid var(--accent-color);
            cursor: pointer; color: var(--text-primary); position: relative; overflow: hidden;
            text-align: center;
            transition: 0.3s ease;
        }
        .resume-card:active { transform: scale(0.98); background: rgba(0,0,0,0.03); }
        .resume-card h2 { color: var(--outline-color); -webkit-text-stroke: 0; font-size: 2.5rem; margin-bottom: 15px; font-weight: 900; }
        .resume-card small { font-weight: 600; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; display: block; margin-bottom: 10px; }
        .resume-card p { font-size: 0.85rem; line-height: 1.5; font-weight: 300; margin: 0 auto; max-width: 80%; }
        .resume-card .play-icon { display: none; } /* Remove play icon for minimal look */
        
        .resume-card::after { content: '✴'; position: absolute; top: 25px; left: 50%; transform: translateX(-50%); color: var(--outline-color); font-size: 1.8rem; }

        .manage-toggle { font-size: 0.65rem; padding: 4px 10px; border-radius: 50px; background: transparent; color: var(--accent-color); border: var(--line-thickness) solid var(--accent-color); cursor: pointer; font-weight: 600; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .manage-toggle.active { background: var(--outline-color); color: #fff; border-color: var(--outline-color); }

        .list-card { background: transparent; padding: 20px 0; border-bottom: var(--line-thickness) solid var(--accent-color); display: flex; align-items: center; cursor: pointer; transition: 0.2s; position: relative; }
        .list-card:active { background: rgba(0,0,0,0.02); padding-left: 10px; }
        .list-card.completed { border-color: var(--accent-color); opacity: 0.5; }
        .list-card.completed::after { content: 'COMPLETED'; position: absolute; right: 0; font-size: 0.6rem; font-weight: 600; letter-spacing: 1px; color: var(--outline-color); transform: rotate(-90deg); transform-origin: right center; }
        
        .delete-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); width: auto; padding: 5px 10px; border-radius: 50px; background: var(--outline-color); border: none; display: none; color: white; font-weight: 600; font-size: 0.7rem; z-index: 10; letter-spacing: 1px; }
        .manage-mode .delete-btn { display: block; }

        .action-btn { position: absolute; top: calc(30px + var(--safe-area-top)); right: 20px; padding: 6px 12px; border-radius: 50px; background: var(--bg-color); border: var(--line-thickness) solid var(--accent-color); font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-color); cursor: pointer; z-index: 1100; transition: 0.2s; }
        .action-btn.danger { color: var(--outline-color); border-color: var(--outline-color); }
        
        .progress-container { width: 100%; height: 2px; background: rgba(0,0,0,0.1); margin: 5px 0 25px 0; position: relative; }
        .progress-bar { height: 100%; background: var(--outline-color); transition: width 0.5s ease; position: relative; }
        .progress-bar::after { content: ''; position: absolute; right: -3px; top: -2px; width: 6px; height: 6px; background: var(--outline-color); border-radius: 50%; }
        
        .week-grid { display: flex; gap: 15px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; border-bottom: var(--line-thickness) solid var(--accent-color); }
        .week-btn { flex: 0 0 auto; padding: 0 5px 10px 5px; background: transparent; text-align: center; cursor: pointer; font-weight: 300; font-size: 1.5rem; color: var(--text-secondary); transition: 0.2s; position: relative; border-bottom: 2px solid transparent; }
        .week-btn.active { color: var(--outline-color); font-weight: 600; border-bottom-color: var(--outline-color); }
        
        .ex-item { background: transparent; padding: 20px 0; margin-bottom: 0; display: flex; align-items: center; cursor: pointer; border-bottom: var(--line-thickness) solid var(--accent-color); transition: 0.2s; }
        .ex-item:active { background: rgba(0,0,0,0.02); padding-left: 10px; }
        .ex-item.done { opacity: 0.4; }
        .ex-item-name { font-weight: 600; flex: 1; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--accent-color); border: var(--line-thickness) solid var(--accent-color); margin: 20px 0; }
        .metric-box { background: var(--bg-color); padding: 15px 10px; text-align: center; }
        .metric-label { font-size: 0.6rem; color: var(--text-primary); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .metric-value { font-size: 1.5rem; font-weight: 300; color: var(--outline-color); }
        
        .set-block { background: transparent; border-radius: 0; padding: 0; margin-bottom: 30px; }
        .set-header { display: flex; align-items: center; gap: 15px; margin-bottom: 0; border-bottom: var(--line-thickness) solid var(--accent-color); padding-bottom: 10px; }
        
        .set-circle { width: 35px; height: 35px; border-radius: 50%; border: var(--line-thickness) solid var(--accent-color); display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 600; transition: 0.2s; cursor: pointer; flex-shrink: 0; background: transparent; color: var(--accent-color); }
        .set-circle.active { background: var(--outline-color); color: #fff; border-color: var(--outline-color); }
        
        .sub-ex-list { padding-left: 50px; border-left: var(--line-thickness) solid var(--accent-color); margin-left: 17px; padding-top: 10px; }
        .sub-ex-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; gap: 10px; }
        .sub-ex-info { flex: 1; }
        .sub-ex-name { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); text-transform: uppercase; letter-spacing: 1px; }
        .sub-ex-reps { font-size: 0.75rem; font-weight: 300; color: var(--outline-color); margin-top: 4px; }
        
        .load-input-wrap { width: 90px; display: flex; align-items: baseline; gap: 4px; border-bottom: var(--line-thickness) solid var(--accent-color); padding-bottom: 2px; }
        .load-input { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 1.5rem; font-weight: 300; padding: 0; text-align: right; border-radius: 0; }
        .load-input:focus { color: var(--outline-color); }
        .load-unit { font-weight: 600; font-size: 0.6rem; color: var(--text-secondary); text-transform: uppercase; }
        
        .session-notes-box { background: transparent; border-radius: 0; padding: 20px 0; margin-top: 40px; border-top: var(--line-thickness) solid var(--accent-color); }
        .session-notes-box label { display: block; font-size: 0.7rem; font-weight: 600; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .session-notes-textarea { width: 100%; background: transparent; border: none; color: var(--text-primary); font-size: 1rem; font-weight: 300; line-height: 1.6; resize: none; min-height: 80px; font-family: inherit; }
        .session-notes-textarea:focus { outline: none; }
        
        .nav-dock { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px 35px 20px; background: var(--bg-color); border-top: var(--line-thickness) solid var(--accent-color); display: flex; gap: 10px; z-index: 1000; }
        .nav-dock.vertical { flex-direction: column; gap: 10px; }
        .btn { flex: 1; border: var(--line-thickness) solid var(--accent-color); padding: 15px; border-radius: 50px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; transition: 0.2s; width: 100%; }
        .btn:active { transform: scale(0.98); }
        .btn-main { background: var(--outline-color); color: #fff; border-color: var(--outline-color); }
        .btn-alt { background: transparent; color: var(--accent-color); }
        
        #toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); background: var(--outline-color); color: #fff; padding: 10px 20px; border-radius: 50px; font-weight: 600; text-transform: uppercase; z-index: 5000; display: none; font-size: 0.7rem; letter-spacing: 2px; }
        
        .floating-add { position: fixed; bottom: 40px; right: 20px; width: 60px; height: 60px; background: transparent; border: var(--line-thickness) solid var(--outline-color); color: var(--outline-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 300; z-index: 1000; cursor: pointer; transition: 0.2s; background-color: var(--bg-color); }
        .floating-add:active { background: var(--outline-color); color: #fff; }
    </style>
</head>
<body>
    <div id="toast"></div>

    <div id="view-home" class="view active">
        <div class="sticky-header">
            <div class="home-header-inner">
                <h1 class="brand-title"><span class="outline">PALE</span><span class="solid">APP</span></h1>
                <div class="util-text">c. 2026<br>PERFORMANCE<br>TRACKER</div>
            </div>
        </div>
        
        <div id="progress-info" class="progress-monitor"></div>
        <div id="resume-section"></div>
        
        <h3 style="margin-top: 40px;">I tuoi Piani <div id="manage-btn" class="manage-toggle" onclick="toggleManageMode()">GESTISCI</div></h3>
        <div id="workouts-list"></div>
        
        <div onclick="showView('view-import')" class="floating-add">+</div>
    </div>

    <!-- Resto delle View invariate... -->
    <div id="view-import" class="view">
        <div class="sticky-header"><div onclick="showView('view-home')" style="color:var(--text-secondary); font-weight:800; cursor:pointer; margin-bottom:8px;">← BACK</div><h1>Import</h1></div>
        <textarea id="import-text" style="width: 100%; height: 300px; background: #111; color: #fff; border-radius: 20px; padding: 20px; border: 1px solid #333; margin: 15px 0;" placeholder="Paste protocol..."></textarea>
        <button id="import-btn" class="btn btn-main" style="width: 100%" onclick="importAction()">INITIALIZE</button>
    </div>

    <div id="view-plan" class="view">
        <div class="sticky-header" style="padding-bottom: 25px;">
            <div onclick="showView('view-home')" style="font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; color:var(--text-secondary); font-weight:600; cursor:pointer; margin-bottom:12px;">← DASHBOARD</div>
            <h1 id="plan-title" style="margin-bottom: 15px;">Protocol</h1>
            <div class="progress-container"><div class="progress-bar" id="total-progress-bar"></div></div>
            <div class="week-grid" id="week-selector"></div>
        </div>
        <div class="day-grid" id="day-list"></div>
    </div>

    <div id="view-session" class="view">
        <div class="sticky-header" style="padding-bottom: 25px;">
            <div onclick="openWorkout(currentWorkoutIndex)" style="font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; color:var(--text-secondary); font-weight:600; cursor:pointer; margin-bottom:12px;">← PIANO</div>
            <h1 id="session-title" style="margin-bottom: 5px;">Day X</h1>
            <p class="subtitle" id="session-subtitle" style="margin-top: 0;">Week 1</p>
            <div class="action-btn danger" onclick="resetDayAction()">Reset</div>
            <div id="session-focus-container" style="margin-top:15px;"></div>
        </div>
        <div id="exercise-list"></div>
        <div class="nav-dock">
            <button class="btn btn-main" onclick="finishSession()">CONCLUDI SESSIONE</button>
            <button class="btn btn-alt" onclick="exportToCSV()" style="flex:0 0 60px; display:flex; align-items:center; justify-content:center;">📥</button>
        </div>
    </div>

    <div id="view-exercise" class="view">
        <div class="sticky-header" style="padding-bottom: 25px;">
            <div onclick="startSession(currentDayIdx)" style="font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; color:var(--text-secondary); font-weight:600; cursor:pointer; margin-bottom:12px;">← LISTA</div>
            <h2 id="ex-detail-name" style="margin-bottom: 5px;">Exercise Name</h2>
            <p class="subtitle" id="ex-detail-meta" style="margin-top: 0; color: var(--outline-color);">Serie 1 di 4</p>
            <div class="action-btn danger" onclick="resetExAction()">Reset</div>
        </div>
        <div class="metrics-grid">
            <div class="metric-box"><div class="metric-label">Serie</div><div class="metric-value" id="val-sets">4</div></div>
            <div class="metric-box"><div class="metric-label">Reps</div><div class="metric-value" id="val-reps">---</div></div>
            <div class="metric-box"><div class="metric-label">Rest</div><div class="metric-value" id="val-rest">90"</div></div>
        </div>
        <div id="sets-blocks-container"></div>
        <div class="session-notes-box">
            <label>NOTE DI SESSIONE</label>
            <textarea class="session-notes-textarea" id="session-notes" placeholder="Com'è andata oggi?" oninput="updateSessionNotes()"></textarea>
        </div>
        <div class="nav-dock vertical">
            <button class="btn btn-main" onclick="nextExercise(true)">PROSSIMO</button>
            <button class="btn btn-alt" onclick="nextExercise(false)">SKIP</button>
        </div>
    </div>

    <script>
        let workouts = JSON.parse(localStorage.getItem('pale_workouts') || '[]');
        let manageMode = false;
        let currentWorkoutIndex = null;
        let currentWeek = 1;
        let currentDayIdx = null;
        let currentExIdx = null;

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function getInc(w) {
            if(!w.days) return null;
            for(let w_i=1; w_i<=w.numWeeks; w_i++) {
                for(let d_i=0; d_i<w.days.length; d_i++) {
                    if(!w.progress || !w.progress[w_i] || !w.progress[w_i][d_i]) return { week: w_i, day: d_i };
                }
            }
            return null;
        }

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function toggleManageMode() {
            manageMode = !manageMode;
            const btn = document.getElementById('manage-btn');
            btn.innerText = manageMode ? 'FINE' : 'GESTISCI';
            btn.classList.toggle('active', manageMode);
            renderHome();
        }

        function renderHome() {
            const progInfo = document.getElementById('progress-info');
            progInfo.innerHTML = '';
            
            const res = document.getElementById('resume-section');
            res.innerHTML = '';

            if (workouts.length > 0) {
                const w = workouts[0];
                const n = getInc(w);
                
                // Calcolo progressi semplici
                let t = w.numWeeks * (w.days?w.days.length:0);
                let d = 0;
                if (w.progress) Object.values(w.progress).forEach(wk => d += Object.keys(wk).length);
                let perc = t ? Math.round((d/t)*100) : 0;
                let left = t - d;

                progInfo.innerHTML = `COMPLETATO: ${perc}% • MANCANO ${left} SESSIONI`;

                if (n) {
                    let titleStr = sanitize(w.title);
                    if(w.subtitle) titleStr += " - " + sanitize(w.subtitle);
                    res.innerHTML = `
                        <div class="resume-card" onclick="resumeWorkout(0)">
                            <small>Continua</small>
                            <h2>${titleStr}</h2>
                            ${w.goal ? `<p>${w.goal}</p>` : ''}
                            <div style="margin-top:15px; font-weight:900; font-size:0.65rem; opacity:0.5;">W${n.week} • GIORNO ${n.day+1}</div>
                            <div class="play-icon">▶</div>
                        </div>`;
                }
            }

            const list = document.getElementById('workouts-list');
            list.innerHTML = workouts.length === 0 ? '<p style="opacity:0.3; text-align:center; padding:20px;">Nessun piano caricato.</p>' : '';
            workouts.forEach((w, i) => {
                const card = document.createElement('div');
                card.className = `list-card ${manageMode ? 'manage-mode' : ''}`;
                card.onclick = () => { if(!manageMode) openWorkout(i); };
                card.innerHTML = `
                    <div style="flex:1">
                        <b>${w.title}</b><br>
                        <small style="opacity:0.5">${w.subtitle || "Senza sottotitolo"}</small>
                    </div>
                    <div class="delete-btn" onclick="event.stopPropagation(); deleteWorkout(${i})">🗑️</div>
                `;
                list.appendChild(card);
            });
        }

        function resumeWorkout(idx) { const w = workouts[idx]; const n = getInc(w); currentWorkoutIndex = idx; if(n) { currentWeek = n.week; startSession(n.day); } else openWorkout(idx); }
        function sanitize(str) { return str ? str.replace(/^[#\*\s\-\–\—]+/g, '').replace(/[#\*\-\–\—\s]+$/g, '').trim() : ""; }
        function cleanMD(str) { return str ? str.replace(/\*\*/g, '').trim() : ""; }
        function cleanSources(str) { return str ? str.replace(/\[[\d,\s]+\]/g, '').trim() : ""; }
        function openWorkout(idx) { currentWorkoutIndex = idx; const w = workouts[idx]; const n = getInc(w); if(!currentWeek) currentWeek = n ? n.week : 1; document.getElementById('plan-title').innerText = sanitize(w.title); updateProg(w); const sel = document.getElementById('week-selector'); sel.innerHTML = ''; for(let i=1; i<=w.numWeeks; i++) { const b = document.createElement('div'); b.className = `week-btn ${currentWeek === i ? 'active' : ''}`; b.innerHTML = `W${i}`; b.onclick = () => { currentWeek = i; openWorkout(idx); }; sel.appendChild(b); } const dList = document.getElementById('day-list'); dList.innerHTML = ''; w.days.forEach((d, dI) => { 
            const prog = w.progress && w.progress[currentWeek] && w.progress[currentWeek][dI];
            const status = prog && (prog === true || prog.completed);
            const timeStr = (prog && prog.completedAt) ? `<div style="font-size:0.7rem; color:var(--accent-color); opacity:0.8; margin-top:4px;">✓ ${new Date(prog.completedAt).toLocaleString([], {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</div>` : '';
            const c = document.createElement('div'); c.className = `list-card ${status ? 'completed' : ''}`; c.onclick = () => startSession(dI); c.innerHTML = `<div style="flex:1"><small style="color:var(--accent-color)">GIORNO ${dI+1}</small><br><b>${sanitize(d.name)}</b>${timeStr}</div>`; dList.appendChild(c); }); showView('view-plan'); }
        function startSession(dI) { currentDayIdx = dI; const w = workouts[currentWorkoutIndex]; const d = w.days[dI]; document.getElementById('session-title').innerText = `GIORNO ${dI + 1}`; document.getElementById('session-subtitle').innerText = `WEEK ${currentWeek} • ${sanitize(d.name)}`; const focus = document.getElementById('session-focus-container'); const str = w.weeklyStructure?.find(s => s.week === 'W' + currentWeek); focus.innerHTML = str ? `<div style="background:rgba(207,255,4,0.08); padding:12px; border-radius:15px; border:1px solid var(--accent-color); font-size:0.8rem;"><b>FOCUS</b>: ${str.note || str.focus}</div>` : ''; const list = document.getElementById('exercise-list'); list.innerHTML = ''; d.exercises.forEach((ex, eI) => { 
            const sessData = ex.sessionData && ex.sessionData[currentWeek];
            const isD = sessData && sessData.completed; 
            const timeStr = (sessData && sessData.completedAt) ? `<div style="font-size:0.7rem; color:var(--accent-color); margin-top:4px; font-weight:600;">Completato ${new Date(sessData.completedAt).toLocaleString([], {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</div>` : '';
            const item = document.createElement('div'); item.className = `ex-item ${isD ? 'done' : ''}`; item.onclick = () => openExercise(eI); item.innerHTML = `<div style="flex:1;"><div class="ex-item-name">${sanitize(ex.name)}</div>${timeStr}</div><div style="font-size:0.8rem; opacity:0.5">${ex.sets} SETS</div>`; list.appendChild(item); }); showView('view-session'); }
        function openExercise(eI) { try { currentExIdx = eI; const ex = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[eI]; if(!ex.sessionData) ex.sessionData = {}; if(!ex.sessionData[currentWeek]) ex.sessionData[currentWeek] = { completed: false, rounds: [], notes: "" }; const data = ex.sessionData[currentWeek]; if(!data.rounds) data.rounds = []; let subExs = []; const hasPlus = ex.notes && ex.notes.includes('+'); const isCircuit = ex.name.toLowerCase().includes('circuito') || ex.name.toLowerCase().includes('superserie'); if(ex.notes && (hasPlus || isCircuit)) { subExs = ex.notes.split('+').map(s => { const clean = s.trim(); if(!clean) return null; const m = clean.match(/(.*?)\s*(\d+.*)/); return { name: m?m[1].trim():clean, reps: m?m[2].trim():"" }; }).filter(x => x !== null); } if(subExs.length === 0) { subExs = [{ name: sanitize(ex.name), reps: ex.reps }]; } const nR = parseInt(ex.sets) || 1; while(data.rounds.length < nR) { data.rounds.push({ done: false, subLoads: new Array(subExs.length).fill("") }); } data.rounds.forEach(r => { if(r.subLoads.length < subExs.length) { while(r.subLoads.length < subExs.length) r.subLoads.push(""); } }); 
        // Propagazione carichi dalle settimane precedenti se l'attuale è vuota
        const isCurrentEmpty = data.rounds.every(r => r.subLoads.every(l => l === ""));
        if (isCurrentEmpty) {
            let prevData = null;
            for (let w = parseInt(currentWeek) - 1; w >= 1; w--) {
                if (ex.sessionData[w] && ex.sessionData[w].rounds && ex.sessionData[w].rounds.some(r => r.subLoads.some(l => l !== ""))) {
                    prevData = ex.sessionData[w];
                    break;
                }
            }
            if (prevData && prevData.rounds) {
                const wObj = workouts[currentWorkoutIndex];
                const isLastWeek = (parseInt(currentWeek) === parseInt(wObj.numWeeks));
                const str = wObj.weeklyStructure?.find(s => s.week === 'W' + currentWeek);
                const focusStr = ((str?.focus || "") + " " + (str?.note || "")).toLowerCase();
                const isDeload = isLastWeek || focusStr.includes('defaticamento') || focusStr.includes('scarico');

                for (let rI = 0; rI < Math.min(data.rounds.length, prevData.rounds.length); rI++) {
                    for (let sI = 0; sI < Math.min(data.rounds[rI].subLoads.length, prevData.rounds[rI].subLoads.length); sI++) {
                        let loadStr = prevData.rounds[rI].subLoads[sI];
                        if (isDeload && loadStr !== "") {
                            let numLoad = parseFloat(loadStr.replace(',', '.'));
                            if (!isNaN(numLoad)) {
                                let deload = Math.round((numLoad * 0.8) * 2) / 2; // Arrotonda ai 0.5kg
                                data.rounds[rI].subLoads[sI] = deload.toString();
                            } else {
                                data.rounds[rI].subLoads[sI] = loadStr;
                            }
                        } else {
                            data.rounds[rI].subLoads[sI] = loadStr;
                        }
                    }
                }
                save(); // Salva subito i nuovi carichi importati
            }
        }
        document.getElementById('ex-detail-name').innerText = sanitize(ex.name); document.getElementById('val-sets').innerText = ex.sets; document.getElementById('val-reps').innerText = subExs.length > 1 ? "Circuito" : ex.reps; document.getElementById('val-rest').innerText = ex.rest; document.getElementById('session-notes').value = data.notes || ""; const container = document.getElementById('sets-blocks-container'); container.innerHTML = ''; data.rounds.forEach((round, rI) => { const block = document.createElement('div'); block.className = 'set-block'; let subHtml = ''; subExs.forEach((sx, sI) => { subHtml += `<div class="sub-ex-row"><div class="sub-ex-info"><div class="sub-ex-name">${sx.name}</div><div class="sub-ex-reps">${sx.reps}</div></div><div class="load-input-wrap"><input type="number" class="load-input" value="${round.subLoads[sI] || ""}" placeholder="---" oninput="updateSubLoad(${rI}, ${sI}, this.value)"><span class="load-unit">KG</span></div></div>`; }); 
            const roundTime = round.timestamp ? `<div style="font-size:0.65rem; color:var(--accent-color); font-weight:800; opacity:0.8;">✓ ${new Date(round.timestamp).toLocaleString([], {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</div>` : '';
            block.innerHTML = `<div class="set-header"><div class="set-circle ${round.done ? 'active' : ''}" onclick="toggleRound(${rI})">${rI+1}</div><div style="flex:1"><div style="font-weight:800; font-size:0.8rem; color:var(--text-secondary)">${subExs.length > 1 ? 'GIRO COMPLETO' : 'SERIE'}</div>${roundTime}</div></div><div class="sub-ex-list">${subHtml}</div>`; container.appendChild(block); }); updateExMeta(); showView('view-exercise'); } catch(e) { console.error(e); showToast("Errore apertura esercizio."); } }
        function toggleRound(rI) { 
            const ex = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[currentExIdx];
            const data = ex.sessionData[currentWeek]; 
            const round = data.rounds[rI];
            round.done = !round.done; 
            
            if (round.done) {
                round.timestamp = new Date().toISOString();
                // Se non c'è peso, chiedilo (prendiamo il primo sub-esercizio per semplicità)
                if (round.subLoads[0] === "") {
                    const val = prompt("Peso per questa serie (kg):");
                    if (val !== null && val !== "") {
                        updateSubLoad(rI, 0, val);
                    }
                }
                
                // Scroll alla prossima serie
                setTimeout(() => {
                    const blocks = document.querySelectorAll('.set-block');
                    if (blocks[rI + 1]) {
                        blocks[rI + 1].scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }, 100);
            } else {
                delete round.timestamp;
            }
            
            save(); 
            openExercise(currentExIdx); 
        }
        function updateSubLoad(rI, sI, val) { 
            const data = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[currentExIdx].sessionData[currentWeek]; 
            data.rounds[rI].subLoads[sI] = val; 
            
            // Se è la prima serie (rI === 0), sovrascrivi tutte le successive
            // Se è una serie successiva, riempi solo quelle ancora vuote
            for (let j = rI + 1; j < data.rounds.length; j++) {
                if (rI === 0 || data.rounds[j].subLoads[sI] === "") {
                    data.rounds[j].subLoads[sI] = val;
                }
            }
            save(); 
        }
        function updateSessionNotes() { const val = document.getElementById('session-notes').value; const data = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[currentExIdx].sessionData[currentWeek]; data.notes = val; save(); }
        function updateExMeta() { 
            const data = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[currentExIdx].sessionData[currentWeek]; 
            const done = data.rounds.filter(r => r.done).length; 
            document.getElementById('ex-detail-meta').innerText = `${done} di ${data.rounds.length} completati`; 
            const isCompleted = (done === data.rounds.length);
            if (isCompleted && !data.completedAt) {
                data.completedAt = new Date().toISOString();
            } else if (!isCompleted) {
                delete data.completedAt;
            }
            data.completed = isCompleted; 
            save(); 
        }
        function nextExercise(markAllComplete) { 
            const ex = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[currentExIdx];
            const data = ex.sessionData[currentWeek];
            
            if (markAllComplete) {
                data.rounds.forEach(r => {
                    r.done = true;
                    if(!r.timestamp) r.timestamp = new Date().toISOString();
                });
            }
            
            data.completed = true;
            if(!data.completedAt) data.completedAt = new Date().toISOString();
            
            save();
            
            const d = workouts[currentWorkoutIndex].days[currentDayIdx]; 
            if(currentExIdx < d.exercises.length - 1) openExercise(currentExIdx + 1); 
            else startSession(currentDayIdx); 
        }
        function resetDayAction() { if(confirm('Resettare il giorno?')) { const d = workouts[currentWorkoutIndex].days[currentDayIdx]; d.exercises.forEach(ex => { if(ex.sessionData) delete ex.sessionData[currentWeek]; }); if(workouts[currentWorkoutIndex].progress && workouts[currentWorkoutIndex].progress[currentWeek]) delete workouts[currentWorkoutIndex].progress[currentWeek][currentDayIdx]; save(); startSession(currentDayIdx); } }
        function resetExAction() { if(confirm('Resettare esercizio?')) { const ex = workouts[currentWorkoutIndex].days[currentDayIdx].exercises[currentExIdx]; if(ex.sessionData) delete ex.sessionData[currentWeek]; save(); openExercise(currentExIdx); } }
        function finishSession() { 
            const w = workouts[currentWorkoutIndex]; 
            if (!w.progress) w.progress = {}; 
            if (!w.progress[currentWeek]) w.progress[currentWeek] = {}; 
            w.progress[currentWeek][currentDayIdx] = { 
                completed: true, 
                completedAt: new Date().toISOString() 
            }; 
            save(); 
            showToast("SESSIONE SALVATA!"); 
            openWorkout(currentWorkoutIndex); 
        }
        function exportToCSV() { 
            const w = workouts[currentWorkoutIndex]; 
            const d = w.days[currentDayIdx]; 
            let csv = "Data,Piano,Settimana,Giorno,Esercizio,SottoEsercizio,Giro,Carico,TimestampSerie,CompletatoExAlle,Note\n"; 
            const date = new Date().toLocaleDateString(); 
            d.exercises.forEach(ex => { 
                const data = ex.sessionData && ex.sessionData[currentWeek]; 
                if(data) { 
                    data.rounds.forEach((round, rI) => { 
                        round.subLoads.forEach((load, sI) => { 
                            csv += `"${date}","${w.title}","W${currentWeek}","${sanitize(d.name)}","${sanitize(ex.name)}","Set ${sI+1}",${rI+1},"${load}","${round.timestamp || ''}","${data.completedAt || ''}","${(data.notes||'').replace(/"/g, '""')}"\n`; 
                        }); 
                    }); 
                } 
            }); 
            const blob = new Blob([csv], { type: 'text/csv' }); 
            const url = window.URL.createObjectURL(blob); 
            const a = document.createElement('a'); 
            a.setAttribute('hidden', ''); 
            a.setAttribute('href', url); 
            a.setAttribute('download', `workout_log_${new Date().getTime()}.csv`); 
            document.body.appendChild(a); 
            a.click(); 
            document.body.removeChild(a); 
        }
        function save() { localStorage.setItem('pale_workouts', JSON.stringify(workouts)); }
        function deleteWorkout(i) { if(confirm('ELIMINARE IL PIANO?')) { workouts.splice(i, 1); save(); renderHome(); } }

        function importAction() {
            const raw = document.getElementById('import-text').value;
            if(!raw.trim()) return;
            const btn = document.getElementById('import-btn');
            btn.innerText = "IMPORTING..."; btn.disabled = true;
            setTimeout(() => {
                const w = { id: "p-" + Date.now(), title: "", subtitle: "", goal: "", numWeeks: 4, weeklyStructure: [], days: [], progress: {} };
                let cleanText = raw;
                const fontiIdx = raw.toLowerCase().lastIndexOf('fonti');
                if(fontiIdx !== -1) cleanText = raw.substring(0, fontiIdx);
                const lines = cleanText.split('\n');
                let inMesociclo = false;
                for(let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if(line.toLowerCase().includes('mesociclo')) { inMesociclo = true; continue; }
                    if(inMesociclo) {
                        if(line.startsWith('##')) { inMesociclo = false; continue; }
                        if(line.includes('**') && (line.includes('–') || line.includes('-')) && !line.toLowerCase().includes('obiettivo')) {
                            const clean = line.replace(/^[-•\*\s]+/, '').replace(/[\*\s]+$/, '').trim();
                            const parts = clean.split(/[–-]/);
                            if(parts.length >= 1) w.title = cleanMD(parts[0]);
                            if(parts.length >= 2) w.subtitle = cleanMD(parts.slice(1).join('-'));
                        }
                        if(line.toLowerCase().includes('obiettivo:')) {
                            let fullGoal = line.replace(/^[-•\*\s]+/, '').replace(/obiettivo:/i, '').replace(/[\*\s]+$/, '').trim();
                            let next = i + 1;
                            while(next < lines.length && !lines[next].trim().startsWith('-') && !lines[next].trim().startsWith('•') && !lines[next].trim().startsWith('##')) {
                                let nextLine = lines[next].trim();
                                if(nextLine !== "") fullGoal += " " + nextLine;
                                next++;
                            }
                            w.goal = cleanMD(cleanSources(fullGoal));
                            i = next - 1;
                        }
                    }
                }
                if(!w.title) w.title = "M7 PROTOCOL";
                const wMatch = cleanText.match(/(\d+)\s*settimane/i);
                if(wMatch) w.numWeeks = parseInt(wMatch[1]);
                let structureTable = []; let inStructureTable = false;
                lines.forEach(l => { if(l.includes('| Settimana |')) inStructureTable = true; else if(inStructureTable && l.includes('| W')) structureTable.push(l); else if(inStructureTable && l.trim() === "") inStructureTable = false; });
                structureTable.forEach(l => { const cols = l.split('|').map(c => c.trim()); if(cols.length >= 3 && cols[1].startsWith('W')) w.weeklyStructure.push({ week: cols[1], focus: cols[2], note: cols[4] || "" }); });
                let inRules = false;
                lines.forEach(l => { const cleanL = l.trim(); if(cleanL.toLowerCase().includes('## progressione')) { inRules = true; return; } if(inRules && cleanL.startsWith('##')) { inRules = false; return; } if(inRules) { const ruleMatch = cleanL.match(/(?:-|\*)\s*\**W(\d+)\**\s*:?\s*(.*)/i); if(ruleMatch) { const wkNum = 'W' + ruleMatch[1]; const content = ruleMatch[2].trim(); let existing = w.weeklyStructure.find(s => s.week === wkNum); if(existing) existing.note = content; else w.weeklyStructure.push({ week: wkNum, focus: "Regola", note: content }); } } });
                let curD = null;
                lines.forEach(l => { if(l.startsWith('## ') && (l.toLowerCase().includes('giorno') || l.toLowerCase().includes('sessione') || l.toLowerCase().includes('giorno extra'))) { if(curD && curD.exercises.length > 0) w.days.push(curD); curD = { name: sanitize(l), exercises: [] }; } else if(curD) { if(l.includes('|') && !l.includes('Esercizio') && !l.includes('---')) { const cols = l.split('|').map(c => c.trim()); if(cols.length >= 4 && cols[1] !== "") { curD.exercises.push({ name: sanitize(cols[1]), sets: cols[2], reps: cols[3], rest: cols[4] || "90s", notes: cols[5] || "" }); } } } });
                if(curD && curD.exercises.length > 0) w.days.push(curD);
                if(w.days.length > 0) { workouts.unshift(w); save(); showToast("IMPORTED"); renderHome(); showView('view-home'); }
                btn.innerText = "INITIALIZE"; btn.disabled = false;
            }, 800);
        }
        function updateProg(w) { let t = w.numWeeks * (w.days?w.days.length:0); let d = 0; if (w.progress) Object.values(w.progress).forEach(wk => d += Object.keys(wk).length); document.getElementById('total-progress-bar').style.width = `${t?(d / t) * 100:0}%`; }
        renderHome();
    </script>
